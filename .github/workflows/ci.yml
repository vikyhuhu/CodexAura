name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: unit-tests
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run unit tests
        run: ./Scripts/test.sh

  build-app:
    name: build-app
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build universal app
        run: ./Scripts/build-app.sh

      - name: Verify binary, signature, and preset resources
        shell: bash
        run: |
          set -euo pipefail
          APP="build/CodexAura.app"
          lipo "$APP/Contents/MacOS/CodexAura" -verify_arch arm64 x86_64
          codesign --verify --deep --strict "$APP"
          PRESET_COUNT="$(find "$APP/Contents/Resources/CodexAura_CodexAuraCore.bundle/Presets" -name theme.json | wc -l | tr -d ' ')"
          test "$PRESET_COUNT" -eq 5

  quality-gate:
    name: quality-gate
    if: always()
    needs:
      - unit-tests
      - build-app
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every technical check to pass
        env:
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          BUILD_APP_RESULT: ${{ needs.build-app.result }}
        run: |
          test "$UNIT_TESTS_RESULT" = "success"
          test "$BUILD_APP_RESULT" = "success"
